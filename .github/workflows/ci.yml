name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository structure
        shell: pwsh
        run: |
          $requiredPaths = @(
            'README.md',
            'README.en.md',
            'README.ru.md',
            'LICENSE',
            '.gitignore',
            '.gitattributes',
            'en\README.md',
            'en\get_windows_server_network_adapter_report.ps1',
            'en\servers.txt.example',
            'ru\README.md',
            'ru\get_windows_server_network_adapter_report.ps1',
            'ru\servers.txt.example'
          )

          $missingPaths = @($requiredPaths | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missingPaths.Count -gt 0) {
            throw ("Missing required repository paths:`n{0}" -f ($missingPaths -join "`n"))
          }

          $trackedServerLists = @(Get-ChildItem -Path $PWD -Recurse -Filter 'servers.txt' -File)
          if ($trackedServerLists.Count -gt 0) {
            throw ("Tracked working server lists are not allowed:`n{0}" -f (($trackedServerLists | ForEach-Object FullName) -join "`n"))
          }

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path $PWD -Recurse -Include *.ps1,*.psm1,*.psd1 -File
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $messages = $errors | ForEach-Object {
                '{0}:{1} {2}' -f $file.FullName, $_.Extent.StartLineNumber, $_.Message
              }
              throw ($messages -join [Environment]::NewLine)
            }
          }

      - name: Validate localization boundaries
        shell: pwsh
        run: |
          $englishScript = 'en\get_windows_server_network_adapter_report.ps1'
          $russianScript = 'ru\get_windows_server_network_adapter_report.ps1'

          if (Select-String -Path $englishScript -Pattern '[А-Яа-яЁё]' -Quiet) {
            throw 'The English script contains Cyrillic text.'
          }

          if (-not (Select-String -Path $russianScript -Pattern '[А-Яа-яЁё]' -Quiet)) {
            throw 'The Russian script does not contain localized Russian text.'
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop
          }

          $analysisTargets = @(
            'en\get_windows_server_network_adapter_report.ps1',
            'ru\get_windows_server_network_adapter_report.ps1'
          )

          $results = foreach ($target in $analysisTargets) {
            Invoke-ScriptAnalyzer -Path $target -Severity Error
          }

          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            throw 'PSScriptAnalyzer reported issues.'
          }
